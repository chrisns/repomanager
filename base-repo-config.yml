vulnerabilityAlerts: true
automatedSecurityFixes: true
secretScanning: true
secretScanningPushProtection: true
privateVulnerabilityReporting: true
dependabotSecurityUpdates: true

rulesets:
  - name: repomanager-default-branch
    target: branch
    enforcement: active
    bypass_actors:
      # Repository admins can always bypass. Without this, an admin (or the
      # bot itself) cannot push hotfixes when the ruleset rolls out, because
      # there's no second approver available in single-maintainer repos.
      - actor_id: 5
        actor_type: RepositoryRole
        bypass_mode: always
    conditions:
      ref_name:
        include:
          - ~DEFAULT_BRANCH
        exclude: []
    rules:
      - type: deletion
      - type: non_fast_forward
      - type: required_linear_history
      - type: pull_request
        parameters:
          required_approving_review_count: 1
          dismiss_stale_reviews_on_push: true
          require_code_owner_review: false
          require_last_push_approval: false
          required_review_thread_resolution: true
